name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      dockerfile_variant:
        description: "Dockerfileの種類"
        required: true
        type: choice
        options:
          - node
      tag:
        description: "Dockerイメージのタグ (省略時は YYMMDD)"
        required: false
        default: ""
      latest:
        description: "latestタグを追加するか"
        required: false
        type: boolean
        default: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up variables
        id: vars
        env:
          INPUT_DOCKERFILE_VARIANT: ${{ github.event.inputs.dockerfile_variant }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_LATEST: ${{ github.event.inputs.latest }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          VARIANT="$INPUT_DOCKERFILE_VARIANT"
          DATE=$(date "+%y%m%d")

          if [ -z "$INPUT_TAG" ]; then
            TAG="$DATE"
          else
            TAG="$INPUT_TAG"
          fi

          if ! echo "$TAG" | grep -Eq '^[A-Za-z0-9_.-]+$'; then
            echo "Error: tag contains invalid characters. Allowed: A-Za-z0-9_.-"
            exit 1
          fi

          if [ "$INPUT_LATEST" = "true" ]; then
            PUSH_LATEST=true
          else
            PUSH_LATEST=false
          fi

          {
            echo "TAG_LIST<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/devcontainer-${VARIANT}:${TAG}"
            if [ "${PUSH_LATEST}" = "true" ]; then
              echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/devcontainer-${VARIANT}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "VARIANT=$VARIANT"
            echo "TAG=$TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64
          context: .
          file: Dockerfile.${{ steps.vars.outputs.VARIANT }}
          tags: ${{ steps.vars.outputs.TAG_LIST }}
